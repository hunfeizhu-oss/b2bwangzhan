<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Xiaoman Themes V3 复刻页面，展示 B2B 跨境独立站模板图库、行业筛选、搜索与预览交互。"
    />
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="%230a6aff"/><text x="32" y="43" text-anchor="middle" font-size="38" font-family="Arial" font-weight="700" fill="white">T</text></svg>'
    />
    <title>Themes V3 Replica</title>
    <style>
      :root {
        --blue: #0a6aff;
        --blue-strong: #1c76fd;
        --ink: #141414;
        --text: #333333;
        --muted: #8c8c8c;
        --soft: #f6f7f9;
        --hero: #eef7ff;
        --line: #ebeef4;
        --footer: #13151a;
        --white: #ffffff;
        --shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        --shadow-strong: 0 18px 44px rgba(20, 30, 54, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: var(--text);
        background: var(--white);
        font-family:
          "PingFang SC", "Microsoft YaHei", "Source Han Sans CN", "Noto Sans SC",
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      body.modal-open {
        overflow: hidden;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
        background: none;
        cursor: pointer;
      }

      img {
        display: block;
        max-width: 100%;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        min-height: 100vh;
        background: var(--white);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        min-height: 80px;
        padding: 20px 72px;
        background: var(--white);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: #121419;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .brand-mark {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border-radius: 12px;
        color: var(--white);
        background: var(--blue);
        font-size: 23px;
        font-weight: 900;
        line-height: 1;
      }

      .portfolio-badge {
        margin-left: 16px;
        padding: 7px 12px;
        border: 1px solid rgba(10, 106, 255, 0.14);
        border-radius: 999px;
        color: var(--blue);
        background: #f4f9ff;
        font-size: 13px;
        font-weight: 700;
      }

      .top-actions {
        display: inline-flex;
        align-items: center;
        gap: 14px;
      }

      .search-trigger,
      .icon-button {
        display: inline-grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 50%;
        color: var(--ink);
        transition:
          color 180ms ease,
          background 180ms ease,
          transform 180ms ease;
      }

      .search-trigger:hover,
      .icon-button:hover {
        color: var(--blue);
        background: rgba(10, 106, 255, 0.08);
        transform: translateY(-1px);
      }

      .search-trigger svg,
      .icon-button svg {
        width: 24px;
        height: 24px;
      }

      .head-bg {
        position: relative;
        overflow: hidden;
        display: flex;
        min-height: 208px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 58px 24px;
        text-align: center;
        background:
          linear-gradient(135deg, rgba(214, 236, 255, 0.78), rgba(244, 250, 255, 0.92)),
          radial-gradient(circle at 14% 20%, rgba(10, 106, 255, 0.13), transparent 26%),
          radial-gradient(circle at 84% 16%, rgba(54, 162, 255, 0.16), transparent 28%),
          #eef7ff;
      }

      .head-bg::before,
      .head-bg::after {
        position: absolute;
        width: 420px;
        height: 180px;
        border: 1px solid rgba(10, 106, 255, 0.09);
        border-radius: 999px;
        content: "";
      }

      .head-bg::before {
        top: -96px;
        left: 5%;
        rotate: -10deg;
      }

      .head-bg::after {
        right: 8%;
        bottom: -118px;
        rotate: 13deg;
      }

      .head-bg h1 {
        position: relative;
        z-index: 1;
        margin: 0 0 20px;
        color: var(--ink);
        font-size: 48px;
        font-weight: 600;
        letter-spacing: 0;
        line-height: 1.18;
      }

      .head-bg p {
        position: relative;
        z-index: 1;
        margin: 0;
        color: var(--text);
        font-size: 18px;
      }

      .search-result-bar {
        display: none;
        align-items: center;
        width: 100%;
        padding: 16px 72px 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .search-result-bar.active {
        display: inline-flex;
      }

      .search-result-bar svg {
        width: 16px;
        height: 16px;
        margin-right: 4px;
        color: var(--blue);
      }

      .search-result-bar button {
        padding: 0;
        color: var(--blue-strong);
        font-size: 14px;
      }

      .industry {
        position: relative;
        display: flex;
        width: 100%;
        flex-wrap: wrap;
        gap: 8px;
        padding: 24px 72px 20px;
        background: var(--white);
      }

      .chip {
        min-height: 42px;
        padding: 11px 16px;
        border-radius: 8px;
        color: var(--text);
        background: var(--soft);
        font-size: 14px;
        font-weight: 600;
        transition:
          color 180ms ease,
          background 180ms ease,
          transform 180ms ease;
      }

      .chip:hover {
        transform: translateY(-1px);
      }

      .chip.active {
        color: var(--white);
        background: var(--blue);
      }

      .industry-fold {
        position: absolute;
        right: 20px;
        top: 34px;
        display: none;
        width: 28px;
        height: 28px;
        place-items: center;
        border-radius: 50%;
        background: var(--white);
        box-shadow: var(--shadow);
      }

      .industry-fold svg {
        width: 16px;
        height: 16px;
        transition: rotate 240ms ease;
      }

      .industry.collapsed .industry-fold svg {
        rotate: 180deg;
      }

      .templates-wrap {
        width: 100%;
        min-height: 420px;
        padding: 28px 72px 36px;
      }

      .templates-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 36px;
      }

      .template-card {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        background: var(--white);
        box-shadow: var(--shadow);
        cursor: pointer;
        transition:
          box-shadow 220ms ease,
          transform 220ms ease;
      }

      .template-card:hover {
        box-shadow: var(--shadow-strong);
        transform: translateY(-3px);
      }

      .template-cover {
        position: relative;
        height: 320px;
        overflow: hidden;
        background: #eef2fa;
      }

      .template-cover img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        transition: transform 500ms ease;
      }

      .template-card:hover .template-cover img {
        transform: scale(1.035);
      }

      .feature-ribbon {
        position: absolute;
        left: 18px;
        top: 0;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 48px;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 0 0 8px 8px;
        color: var(--white);
        background: var(--blue);
        font-size: 12px;
        font-weight: 700;
      }

      .template-title {
        overflow: hidden;
        width: 100%;
        padding: 20px 16px 34px;
        color: var(--ink);
        font-size: 18px;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .template-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        padding: 0 20px 20px 0;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.7);
        opacity: 0;
        transition: opacity 220ms ease;
      }

      .template-card:hover .template-overlay {
        opacity: 1;
      }

      .preview-button {
        min-width: 56px;
        height: 30px;
        border: 1px solid var(--white);
        border-radius: 8px;
        color: var(--text);
        background: var(--soft);
        font-size: 14px;
        line-height: 30px;
        text-align: center;
      }

      .empty-state {
        display: none;
        min-height: 360px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        text-align: center;
      }

      .empty-state.active {
        display: flex;
      }

      .empty-icon {
        position: relative;
        width: 68px;
        height: 56px;
        margin-bottom: 16px;
      }

      .empty-icon::before {
        position: absolute;
        inset: 10px 4px 0;
        border: 2px solid #d9dfeb;
        border-radius: 12px;
        content: "";
      }

      .empty-icon::after {
        position: absolute;
        left: 20px;
        top: 0;
        width: 28px;
        height: 26px;
        border-radius: 10px 10px 4px 4px;
        background: #eef2fa;
        box-shadow:
          -13px 19px 0 -8px #d9dfeb,
          13px 19px 0 -8px #d9dfeb;
        content: "";
      }

      .empty-state strong {
        color: #000000;
        font-size: 16px;
        font-weight: 600;
      }

      .empty-state span {
        margin-top: 8px;
      }

      .site-footer {
        display: flex;
        width: 100%;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 36px 20px;
        color: var(--white);
        background: var(--footer);
      }

      .footer-logo {
        margin-bottom: 18px;
        color: var(--white);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .copyright {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        opacity: 0.4;
        color: var(--white);
        font-size: 12px;
      }

      .search-modal {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: none;
        background: rgba(0, 0, 0, 0.7);
      }

      .search-modal.active {
        display: block;
      }

      .search-box {
        display: flex;
        width: 100%;
        justify-content: center;
        padding: 40px 32px 60px;
        background: var(--white);
      }

      .search-panel {
        width: min(1110px, 100%);
      }

      .search-row {
        display: flex;
        width: 100%;
        align-items: center;
      }

      .search-input-wrap {
        display: inline-flex;
        flex: 1;
        align-items: center;
        border-bottom: 1px solid #bebebe;
      }

      .search-input-wrap svg {
        flex: 0 0 auto;
        width: 24px;
        height: 24px;
        margin: 0 16px 0 28px;
      }

      .search-input {
        width: 100%;
        height: 58px;
        border: 0;
        outline: none;
        color: var(--ink);
        font-size: 18px;
      }

      .clear-search {
        display: none;
        flex: 0 0 auto;
        width: 36px;
        height: 36px;
        margin-right: 6px;
        place-items: center;
        border-radius: 50%;
        color: #b6bdc8;
      }

      .clear-search.active {
        display: grid;
      }

      .cancel-search {
        flex-shrink: 0;
        margin-left: 14px;
        padding: 8px 0;
        color: var(--text);
        font-size: 16px;
      }

      .cancel-search:hover {
        color: var(--blue-strong);
      }

      .quick-link {
        width: 100%;
        margin-top: 40px;
      }

      .quick-label {
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .quick-item {
        width: 100%;
        padding: 9px 10px;
        color: var(--text);
        font-size: 16px;
        text-align: left;
      }

      .quick-item:hover {
        background: rgba(0, 0, 0, 0.04);
      }

      .suggestions {
        max-height: 220px;
        overflow-y: auto;
      }

      .highlight {
        color: var(--blue);
      }

      .to-top {
        position: fixed;
        right: 20px;
        bottom: 20px;
        z-index: 20;
        display: inline-grid;
        width: 50px;
        height: 50px;
        place-items: center;
        border: 1px solid var(--white);
        border-radius: 50%;
        color: var(--white);
        background: rgba(0, 0, 0, 0.3);
      }

      .to-top svg {
        width: 28px;
        height: 28px;
      }

      @media (max-width: 1199px) {
        .templates-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 1024px) {
        .topbar,
        .search-result-bar,
        .industry,
        .templates-wrap {
          padding-right: 32px;
          padding-left: 32px;
        }

        .templates-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 768px) {
        .topbar {
          min-height: 76px;
          padding: 18px 20px;
        }

        .brand {
          gap: 9px;
          font-size: 24px;
        }

        .brand-mark {
          width: 34px;
          height: 34px;
          border-radius: 10px;
          font-size: 20px;
        }

        .portfolio-badge {
          display: none;
        }

        .head-bg {
          min-height: 176px;
          padding: 48px 24px;
        }

        .head-bg h1 {
          margin-bottom: 16px;
          font-size: 28px;
        }

        .head-bg p {
          font-size: 14px;
        }

        .search-result-bar {
          padding: 16px 20px 8px;
        }

        .industry {
          padding: 24px 50px 20px 20px;
        }

        .industry.collapsed {
          max-height: 64px;
          overflow: hidden;
          padding-bottom: 50px;
        }

        .industry-fold {
          display: grid;
        }

        .chip {
          min-height: 38px;
          padding: 9px 14px;
        }

        .templates-wrap {
          padding: 28px 20px 36px;
        }

        .templates-grid {
          grid-template-columns: 1fr;
          gap: 32px;
        }

        .template-overlay {
          display: none;
        }

        .search-box {
          padding: 0 20px 24px 0;
        }

        .search-panel {
          padding-top: 20px;
        }

        .search-input-wrap svg {
          margin-left: 20px;
        }

        .search-input {
          font-size: 16px;
        }

        .quick-link {
          margin-top: 24px;
          padding-left: 20px;
        }

        .copyright {
          flex-direction: column;
          gap: 2px;
        }

        .to-top {
          width: 36px;
          height: 36px;
        }

        .to-top svg {
          width: 20px;
          height: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page" id="top">
      <header class="topbar">
        <a class="brand" href="#top" aria-label="Themes 首页">
          <span class="brand-mark">T</span>
          <span>Themes</span>
        </a>
        <div class="top-actions">
          <button class="search-trigger" type="button" aria-label="打开搜索" id="openSearch">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m20 20-3.2-3.2"></path>
            </svg>
          </button>
        </div>
      </header>

      <section class="head-bg" id="hero">
        <h1>B2B跨境独立站模版</h1>
        <p>面向高质量转化打造、每个模板均满足高标准、能够快速加载、适应移动端</p>
      </section>

      <div class="search-result-bar" id="searchResultBar">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="m20 20-3.2-3.2"></path>
        </svg>
        <span id="searchResultText"></span>
        <button type="button" id="resetSearch">点击返回首页</button>
      </div>

      <nav class="industry" id="industryFilters" aria-label="行业筛选"></nav>

      <section class="templates-wrap" aria-label="模板列表">
        <div class="templates-grid" id="templatesGrid"></div>
        <div class="empty-state" id="emptyState">
          <div class="empty-icon" aria-hidden="true"></div>
          <strong>暂无数据</strong>
          <span>换个配方试试吧</span>
        </div>
      </section>

      <footer class="site-footer">
        <div class="footer-logo">OKKI THEMES</div>
        <div class="copyright">
          <span>Copyright © 2013-2020 OKKI Inc. All rights reserved.</span>
          <span>深圳市小满科技有限公司 版权所有</span>
          <span>粤ICP备12085749号-5</span>
        </div>
      </footer>

      <button class="to-top" type="button" aria-label="回到顶部" id="toTop">
        <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
          <path d="m6 15 6-6 6 6"></path>
        </svg>
      </button>
    </main>

    <div class="search-modal" id="searchModal" aria-hidden="true">
      <div class="search-box">
        <div class="search-panel">
          <div class="search-row">
            <div class="search-input-wrap">
              <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="7"></circle>
                <path d="m20 20-3.2-3.2"></path>
              </svg>
              <input class="search-input" id="searchInput" type="text" placeholder="搜索" autocomplete="off" />
              <button class="clear-search" id="clearSearch" type="button" aria-label="清除搜索">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
                  <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm3.7 12.3a1 1 0 0 1-1.4 1.4L12 13.4l-2.3 2.3a1 1 0 0 1-1.4-1.4l2.3-2.3-2.3-2.3a1 1 0 0 1 1.4-1.4l2.3 2.3 2.3-2.3a1 1 0 0 1 1.4 1.4L13.4 12l2.3 2.3Z"></path>
                </svg>
              </button>
            </div>
            <button class="cancel-search" id="cancelSearch" type="button">取消</button>
          </div>
          <div class="quick-link" id="quickLink"></div>
        </div>
      </div>
    </div>

    <script>
      const industries = [

        },
        {

          industry: "可再生能源",
          cover: "assets/factory-aerial.png",
          featured: true,
          tags: "renewable energy clean factory"
        },
        {
          id: 12,
          name: "纺织面料品牌站",
          industry: "面料及纺织品",
          cover: "assets/blog-quality.png",
          featured: false,
          tags: "textile fabric quality material"
        },
        {
          id: 13,
          name: "电子元器件目录站",
          industry: "电子元器件",
          cover: "assets/maxmov/factory-rd.png",
          featured: false,
          tags: "electronics components rd engineering"
        },
        {
          id: 14,
          name: "智能家用电器官网",
          industry: "家用电器",
          cover: "assets/maxmov/about-showroom.png",
          featured: false,
          tags: "appliance smart home showroom"
        },
        {
          id: 15,
          name: "跨境 B2B 新闻内容站",
          industry: "其他",
          cover: "assets/maxmov/blog-eec.png",
          featured: false,
          tags: "blog news b2b europe guide"
        },
        {
          id: 16,
          name: "移动代步车产品站",
          industry: "汽车零配件",
          cover: "assets/maxmov/category-mobility.png",
          featured: false,
          tags: "mobility scooter vehicle parts"
        }
      ];

      const state = {
        industry: "全部",
        search: "",
        resultMode: false,
        mobileCollapsed: window.innerWidth < 768
      };

      const filtersEl = document.getElementById("industryFilters");
      const gridEl = document.getElementById("templatesGrid");
      const emptyEl = document.getElementById("emptyState");
      const searchModal = document.getElementById("searchModal");
      const searchInput = document.getElementById("searchInput");
      const clearSearch = document.getElementById("clearSearch");
      const quickLink = document.getElementById("quickLink");
      const resultBar = document.getElementById("searchResultBar");
      const resultText = document.getElementById("searchResultText");
      const hero = document.getElementById("hero");

      function normalize(value) {
        return String(value || "").trim().toLowerCase();
      }

      function getVisibleTemplates() {
        const keyword = normalize(state.search);
        return templates.filter((item) => {
          const inIndustry = state.industry === "全部" || item.industry === state.industry;
          if (!inIndustry) return false;
          if (!keyword) return true;
          return normalize(`${item.name} ${item.industry} ${item.tags}`).includes(keyword);
        });
      }

      function renderFilters() {
        filtersEl.innerHTML = "";
        filtersEl.classList.toggle("collapsed", state.mobileCollapsed);

        industries.forEach((industry) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `chip${state.industry === industry ? " active" : ""}`;
          button.textContent = industry;
          button.addEventListener("click", () => {
            state.industry = industry;
            state.resultMode = false;
            state.search = "";
            searchInput.value = "";
            render();
          });
          filtersEl.appendChild(button);
        });

        const fold = document.createElement("button");
        fold.type = "button";
        fold.className = "industry-fold";
        fold.setAttribute("aria-label", state.mobileCollapsed ? "展开行业筛选" : "收起行业筛选");
        fold.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"></path></svg>';
        fold.addEventListener("click", () => {
          state.mobileCollapsed = !state.mobileCollapsed;
          renderFilters();
        });
        filtersEl.appendChild(fold);
      }

      function renderTemplates() {
        const items = getVisibleTemplates();
        gridEl.innerHTML = "";
        emptyEl.classList.toggle("active", items.length === 0);

        items.forEach((item) => {
          const card = document.createElement("article");
          card.className = "template-card";
          card.setAttribute("tabindex", "0");
          card.setAttribute("aria-label", `${item.name}，${item.industry}`);
          card.innerHTML = `
            ${item.featured ? '<span class="feature-ribbon">精选</span>' : ""}
            <div class="template-cover">
              <img src="${item.cover}" alt="${item.name}" />
            </div>
            <div class="template-title">${item.name}</div>
            <div class="template-overlay" aria-hidden="true">
              <div class="preview-button">预览</div>
            </div>
          `;
          card.addEventListener("click", () => previewTemplate(item));
          card.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              previewTemplate(item);
            }
          });
          gridEl.appendChild(card);
        });
      }

      function renderResultMode() {
        const showResult = state.resultMode && state.search;
        hero.style.display = showResult ? "none" : "";
        resultBar.classList.toggle("active", showResult);
        resultText.textContent = showResult ? `以下为"${state.search}"的搜索结果，` : "";
      }

      function renderQuickLinks() {
        const keyword = searchInput.value.trim();
        clearSearch.classList.toggle("active", Boolean(keyword));
        quickLink.innerHTML = "";

        const label = document.createElement("div");
        label.className = "quick-label";
        label.textContent = keyword ? "搜索建议" : "快速链接";
        quickLink.appendChild(label);

        const source = keyword
          ? templates
              .filter((item) => normalize(`${item.name} ${item.industry} ${item.tags}`).includes(normalize(keyword)))
              .slice(0, 8)
              .map((item) => item.name)
          : quickLinks;

        const list = document.createElement("div");
        list.className = keyword ? "suggestions" : "";

        source.forEach((text) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "quick-item";
          item.innerHTML = keyword ? highlight(text, keyword) : text;
          item.addEventListener("click", () => {
            if (quickLinks.includes(text)) {
              state.industry = text;
              state.search = "";
              state.resultMode = false;
            } else {
              state.search = text;
              state.industry = "全部";
              state.resultMode = true;
            }
            closeSearch();
            render();
          });
          list.appendChild(item);
        });

        if (source.length === 0) {
          const empty = document.createElement("div");
          empty.className = "quick-item";
          empty.textContent = "没有匹配的模板";
          list.appendChild(empty);
        }

        quickLink.appendChild(list);
      }

      function highlight(text, keyword) {
        const safeKeyword = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        return text.replace(new RegExp(`(${safeKeyword})`, "gi"), '<span class="highlight">$1</span>');
      }

      function render() {
        renderFilters();
        renderResultMode();
        renderTemplates();
      }

      function openSearch() {
        searchModal.classList.add("active");
        searchModal.setAttribute("aria-hidden", "false");
        document.body.classList.add("modal-open");
        renderQuickLinks();
        window.setTimeout(() => searchInput.focus(), 40);
      }

      function closeSearch() {
        searchModal.classList.remove("active");
        searchModal.setAttribute("aria-hidden", "true");
        document.body.classList.remove("modal-open");
      }

      function runSearch(value) {
        const keyword = value.trim();
        if (!keyword) return;
        state.search = keyword;
        state.industry = "全部";
        state.resultMode = true;
        closeSearch();
        render();
      }

      function previewTemplate(item) {
        if (item.url) {
          window.open(item.url, "_blank", "noopener,noreferrer");
          return;
        }
        const query = encodeURIComponent(item.name);
        window.open(`https://themes.xiaoman.cn/v3/?preview=${query}`, "_blank", "noopener,noreferrer");
      }

      document.getElementById("openSearch").addEventListener("click", openSearch);
      document.getElementById("cancelSearch").addEventListener("click", closeSearch);
      document.getElementById("clearSearch").addEventListener("click", () => {
        searchInput.value = "";
        renderQuickLinks();
        searchInput.focus();
      });

      searchModal.addEventListener("click", (event) => {
        if (event.target === searchModal) closeSearch();
      });

      searchInput.addEventListener("input", renderQuickLinks);
      searchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") runSearch(searchInput.value);
        if (event.key === "Escape") closeSearch();
      });

      document.getElementById("resetSearch").addEventListener("click", () => {
        state.search = "";
        state.industry = "全部";
        state.resultMode = false;
        searchInput.value = "";
        render();
      });

      document.getElementById("toTop").addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      window.addEventListener("resize", () => {
        const shouldCollapse = window.innerWidth < 768;
        if (shouldCollapse !== state.mobileCollapsed) {
          state.mobileCollapsed = shouldCollapse;
          renderFilters();
        }
      });

      render();
    </script>
  </body>
</html>
