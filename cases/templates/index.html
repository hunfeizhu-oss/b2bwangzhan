    <title>Template Case Preview</title>
    <style>
      :root {
        --blue: #0a6aff;
        --ink: #141414;
        --text: #333333;
        --muted: #737373;
        --line: #e9edf5;
        --soft: #f6f7f9;
        --wash: #eef7ff;
        --white: #ffffff;
        --shadow: 0 10px 34px rgba(20, 26, 38, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        color: var(--text);
        background: var(--white);
        font-family:
          "PingFang SC", "Microsoft YaHei", "Source Han Sans CN", "Noto Sans SC",
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      img {
        display: block;
        max-width: 100%;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 74px;
        padding: 0 clamp(20px, 5vw, 72px);
        border-bottom: 1px solid rgba(233, 237, 245, 0.86);
        background: rgba(255, 255, 255, 0.94);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        font-size: 22px;
        font-weight: 900;
      }

      .brand-mark {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border-radius: 10px;
        color: var(--white);
        background: var(--blue);
        font-size: 19px;
      }

      .nav {
        display: flex;
        align-items: center;
        gap: 28px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      .nav a:hover,
      .back-link {
        color: var(--blue);
      }

      .hero {
        background:
          linear-gradient(125deg, rgba(238, 247, 255, 0.95), rgba(255, 255, 255, 0.9)),
          radial-gradient(circle at 14% 20%, rgba(10, 106, 255, 0.12), transparent 26%),
          var(--wash);
      }

      .hero-grid {
        display: grid;
        width: min(1300px, calc(100% - 40px));
        min-height: 620px;
        margin: 0 auto;
        padding: 70px 0;
        grid-template-columns: minmax(0, 0.92fr) minmax(480px, 1.08fr);
        gap: 56px;
        align-items: center;
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        color: var(--blue);
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .kicker::before {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--blue);
        content: "";
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 18px;
        color: var(--ink);
        font-size: clamp(44px, 6vw, 76px);
        font-weight: 950;
        line-height: 1.02;
        letter-spacing: 0;
      }

      .lead {
        max-width: 610px;
        margin-bottom: 28px;
        color: var(--text);
        font-size: clamp(18px, 2vw, 22px);
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 32px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .btn-primary {
        color: var(--white);
        background: var(--blue);
        box-shadow: 0 14px 30px rgba(10, 106, 255, 0.24);
      }

      .btn-secondary {
        border: 1px solid rgba(10, 106, 255, 0.22);
        color: var(--blue);
        background: var(--white);
      }

      .proof-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .proof {
        min-height: 92px;
        padding: 17px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
      }

      .proof strong {
        display: block;
        color: var(--ink);
        font-size: 24px;
        font-weight: 950;
      }

      .proof span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .hero-media {
        overflow: hidden;
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .hero-media img {
        width: 100%;
        height: 530px;
        object-fit: cover;
      }

      .section {
        width: min(1300px, calc(100% - 40px));
        margin: 0 auto;
        padding: 82px 0;
      }

      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 32px;
        margin-bottom: 32px;
      }

      .section-head h2 {
        margin-bottom: 0;
        color: var(--ink);
        font-size: clamp(32px, 4.4vw, 54px);
        font-weight: 950;
        line-height: 1.02;
      }

      .section-head p {
        max-width: 430px;
        margin-bottom: 0;
        color: var(--muted);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 24px;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        box-shadow: 0 8px 26px rgba(20, 26, 38, 0.06);
      }

      .card img {
        width: 100%;
        height: 236px;
        object-fit: cover;
      }

      .card-body {
        padding: 18px;
      }

      h3 {
        margin-bottom: 8px;
        color: var(--ink);
        font-size: 19px;
        font-weight: 900;
      }

      .card p {
        margin-bottom: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .band {
        background: #101828;
      }

      .band-grid {
        display: grid;
        width: min(1300px, calc(100% - 40px));
        margin: 0 auto;
        padding: 82px 0;
        grid-template-columns: 0.94fr 1.06fr;
        gap: 56px;
        align-items: center;
      }

      .band h2 {
        margin-bottom: 16px;
        color: var(--white);
        font-size: clamp(32px, 4.4vw, 54px);
        font-weight: 950;
        line-height: 1.02;
      }

      .band p {
        color: rgba(255, 255, 255, 0.72);
      }

      .feature-list {
        display: grid;
        gap: 14px;
        margin-top: 24px;
      }

      .feature-list span {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--white);
        font-weight: 800;
      }

      .feature-list span::before {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #fdb022;
        content: "";
      }

      .band img {
        width: 100%;
        height: 400px;
        border-radius: 8px;
        object-fit: cover;
      }

      .cta {
        width: min(1300px, calc(100% - 40px));
        margin: 0 auto 82px;
        padding: 44px;
        border-radius: 8px;
        color: var(--white);
        background:
          linear-gradient(135deg, rgba(10, 106, 255, 0.96), rgba(20, 184, 166, 0.9)),
          var(--blue);
      }

      .cta h2 {
        margin-bottom: 12px;
        font-size: clamp(30px, 4vw, 46px);
      }

      .cta p {
        max-width: 680px;
        margin-bottom: 0;
        color: rgba(255, 255, 255, 0.82);
      }

      footer {
        padding: 32px 20px;
        color: rgba(255, 255, 255, 0.58);
        background: #13151a;
        text-align: center;
      }

      @media (max-width: 980px) {
        .nav a:not(.back-link) {
          display: none;
        }

        .hero-grid,
        .band-grid {
          grid-template-columns: 1fr;
        }

        .hero-media img {
          height: 430px;
        }

        .cards {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .topbar {
          height: 64px;
        }

        .brand {
          font-size: 19px;
        }

        .brand-mark {
          width: 32px;
          height: 32px;
        }

        .hero-grid {
          min-height: auto;
          padding: 50px 0 62px;
        }

        .proof-row,
        .cards {
          grid-template-columns: 1fr;
        }

        .hero-media img,
        .band img {
          height: 330px;
        }

        .section {
          padding: 64px 0;
        }

        .section-head {
          align-items: flex-start;
          flex-direction: column;
        }

        .band-grid {
          padding: 64px 0;
        }

        .cta {
          padding: 30px 22px;
        }
      }
    </style>
  </head>

      function currentCase() {
        const params = new URLSearchParams(window.location.search);
        return cases[params.get("case")] || cases["industrial-machinery"];
      }

      function setText(id, text) {
        document.getElementById(id).textContent = text;
      }

      function cardMarkup(items) {
        return items
          .map(
            ([title, text, image]) => `
              <article class="card">
                <img src="${image}" alt="${title}" />
                <div class="card-body">
                  <h3>${title}</h3>
                  <p>${text}</p>
                </div>
              </article>
            `
          )
          .join("");
      }

      function render() {
        const data = currentCase();
        document.title = `${data.brand} | Template Case`;
        setText("brandMark", data.mark);
        setText("brandName", data.brand);
        setText("industry", data.industry);
        setText("headline", data.headline);
        setText("lead", data.lead);
        setText("productsTitle", data.productsTitle);
        setText("productsIntro", data.productsIntro);
        setText("solutionKicker", `${data.industry} Solution`);
        setText("solutionTitle", data.solutionTitle);
        setText("solutionText", data.solutionText);
        setText("ctaTitle", data.ctaTitle);
        setText("ctaText", data.ctaText);
        setText("footerText", `${data.brand} template case inside Themes V3 replica.`);

        document.getElementById("heroImage").src = data.hero;
        document.getElementById("heroImage").alt = data.headline;
        document.getElementById("solutionImage").src = data.solutionImage;
        document.getElementById("solutionImage").alt = data.solutionTitle;

        document.getElementById("metrics").innerHTML = data.metrics
          .map((metric) => `<div class="proof"><strong>${metric}</strong><span>${data.industry}</span></div>`)
          .join("");
        document.getElementById("productCards").innerHTML = cardMarkup(data.products);
        document.getElementById("proofCards").innerHTML = sharedProof
          .map((item) => [item.title, item.text, item.image])
          .map(([title, text, image]) => `
              <article class="card">
                <img src="${image}" alt="${title}" />
                <div class="card-body">
                  <h3>${title}</h3>
                  <p>${text}</p>
                </div>
              </article>
            `)
          .join("");
        document.getElementById("featureList").innerHTML = data.features
          .map((feature) => `<span>${feature}</span>`)
          .join("");
      }

      render();
    </script>
