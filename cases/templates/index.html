<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="个人网站模板案例预览" />
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="%230a6aff"/><text x="32" y="43" text-anchor="middle" font-size="38" font-family="Arial" font-weight="700" fill="white">T</text></svg>'
    />
    <title>模板预览</title>
    <style>
      :root {
        --blue: #0a6aff;
        --ink: #141414;
        --text: #333333;
        --muted: #8c8c8c;
        --soft: #f6f7f9;
        --line: #e9edf5;
        --white: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        background: var(--soft);
        font-family:
          "PingFang SC", "Microsoft YaHei", "Source Han Sans CN", "Noto Sans SC",
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .preview-app {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: grid;
        min-height: 74px;
        padding: 14px 72px;
        grid-template-columns: 160px minmax(0, 1fr) auto;
        gap: 28px;
        align-items: center;
        border-bottom: 1px solid rgba(233, 237, 245, 0.9);
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 10px;
        color: var(--white);
        background: var(--blue);
        font-size: 20px;
        font-weight: 800;
      }

      .template-info {
        min-width: 0;
      }

      h1 {
        overflow: hidden;
        margin: 0 0 5px;
        color: var(--ink);
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1.2;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .meta {
        display: flex;
        overflow: hidden;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .dot {
        width: 4px;
        height: 4px;
        flex: 0 0 auto;
        border-radius: 50%;
        background: #c9d0dc;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--white);
        color: var(--text);
        font-size: 14px;
        font-weight: 600;
      }

      .button.primary {
        border-color: var(--blue);
        background: var(--blue);
        color: var(--white);
      }

      .viewport {
        position: relative;
        flex: 1;
        min-height: calc(100vh - 74px);
        background: #eef2fa;
      }

      iframe {
        display: block;
        width: 100%;
        height: calc(100vh - 74px);
        border: 0;
        background: var(--white);
      }

      .empty {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 28px;
        color: var(--muted);
        text-align: center;
      }

      .empty.active {
        display: grid;
      }

      @media (max-width: 760px) {
        .topbar {
          min-height: 120px;
          padding: 14px 20px;
          grid-template-columns: 1fr auto;
          gap: 10px 14px;
        }

        .brand {
          grid-column: 1;
        }

        .template-info {
          grid-column: 1 / -1;
          grid-row: 2;
        }

        .actions {
          grid-column: 2;
          grid-row: 1;
        }

        .button {
          min-height: 34px;
          padding: 0 10px;
          font-size: 13px;
        }

        iframe {
          height: calc(100vh - 120px);
        }
      }
    </style>
  </head>
  <body>
    <div class="preview-app">
      <header class="topbar">
        <a class="brand" href="../../" aria-label="模板案例库首页">
          <span class="brand-mark">T</span>
          <span>模板案例库</span>
        </a>
        <div class="template-info">
          <h1 id="templateName">模板预览</h1>
          <div class="meta" id="templateMeta"></div>
        </div>
        <div class="actions">
          <a class="button" href="../../">返回模板库</a>
          <a class="button primary" id="openOriginal" href="#" target="_blank" rel="noopener noreferrer">打开预览</a>
        </div>
      </header>

      <main class="viewport">
        <iframe id="previewFrame" title="Template preview" referrerpolicy="no-referrer-when-downgrade"></iframe>
        <div class="empty" id="emptyState">暂无数据</div>
      </main>
    </div>

    <script src="../../assets/templates-v3-data.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const requested = params.get("case") || "";
      const templates = window.TEMPLATE_LIBRARY_ITEMS || [];
      const byName = window.TEMPLATE_LIBRARY_BY_NAME || {};
      const template = byName[requested.toLowerCase()] || templates[0];
      const frame = document.getElementById("previewFrame");
      const emptyState = document.getElementById("emptyState");
      const openOriginal = document.getElementById("openOriginal");

      function renderMeta(item) {
        const parts = [
          ...(item.primaryTags || []),
          ...(item.features || []).slice(0, 3)
        ];

        document.getElementById("templateMeta").innerHTML = parts
          .map((part, index) => `${index ? '<span class="dot"></span>' : ""}<span>${part}</span>`)
          .join("");
      }

      if (!template) {
        emptyState.classList.add("active");
        frame.remove();
      } else {
        document.title = `${template.name} | 模板预览`;
        document.getElementById("templateName").textContent = template.name;
        renderMeta(template);
        frame.src = template.previewUrl;
        openOriginal.href = template.previewUrl;
      }
    </script>
  </body>
</html>
